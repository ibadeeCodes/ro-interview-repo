version: "3.8"

services:
  # NestJS service
  backend:
    build: .
    ports:
      - "3001:3001"
    env_file: .env  # Use .env file to collect environment variables
    depends_on:
      - postgres  # Ensure that the backend service starts after the postgres service
    restart: always
  # Postgres service
  postgres:
    image: postgres:11.16
    environment:
      POSTGRES_PASSWORD: 123456
      POSTGRES_USER: postgres
      POSTGRES_DB: sdc-db
    ports:
      - "5432:5432"  
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-data:/var/lib/postgresql/data

# Define volume for Postgres data (optional)
volumes:
  postgres-data:
